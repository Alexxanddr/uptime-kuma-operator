apiVersion: v1
kind: Namespace
metadata:
  name: uptime-kuma-operator
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: uptime-kuma-operator
  namespace: uptime-kuma-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: uptime-kuma-operator-role
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/status"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["list", "watch", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: uptime-kuma-operator-binding
subjects:
  - kind: ServiceAccount
    name: uptime-kuma-operator
    namespace: uptime-kuma-operator
roleRef:
  kind: ClusterRole
  name: uptime-kuma-operator-role
  apiGroup: rbac.authorization.k8s.io
